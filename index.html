<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViaMath | Journey Through Math</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #00E5FF;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: #fff;
            overflow: hidden;
            user-select: none;
            cursor: pointer;
        }

        /* Snap-Scroll Feed */
        .feed {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .feed::-webkit-scrollbar { display: none; }

        .slide {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 50px;
            overflow: hidden;
        }

        /* High-End Typography */
        .gta-title {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 0.8;
            letter-spacing: -6px;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .tagline {
            font-size: clamp(0.9rem, 1.8vw, 1.2rem);
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .period-header {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .period-header::before { content: ""; width: 40px; height: 3px; background: var(--accent); border-radius: 99px; }

        /* Modern Glass Menu */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 360px;
            z-index: 10;
        }

        .option {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 26px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(40px);
        }

        .option:hover {
            background: #fff;
            color: #000;
            transform: scale(1.02) translateX(10px);
        }

        .option span { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* Navigation Header */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 40px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 4px; font-style: italic; }

        /* Drawer Overlay (Chat Only) */
        .drawer {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 90vh;
            background: #050508;
            border-radius: 44px 44px 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(105%);
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 100;
            display: flex; flex-direction: column; padding: 40px;
        }
        .drawer.active { transform: translateY(0); }

        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .drawer-title { font-weight: 900; text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem; }
        .close-btn { background: rgba(255, 255, 255, 0.05); padding: 10px 20px; border-radius: 12px; cursor: pointer; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; }

        .chat-container { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        .msg { max-width: 85%; padding: 20px 24px; border-radius: 24px; font-size: 0.95rem; line-height: 1.6; }
        .msg.ai { background: rgba(255, 255, 255, 0.05); align-self: flex-start; border: 1px solid rgba(255, 255, 255, 0.05); }
        .msg.user { background: #fff; color: #000; align-self: flex-end; font-weight: 700; }
        input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 24px 30px; border-radius: 24px; color: #fff; width: 100%; font-size: 1rem; outline: none; }

        #p5-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>
<body>

    <header>
        <div class="logo">VIAMATH</div>
        <div class="drawer-title" style="color: rgba(255,255,255,0.3)">Feed v3.0</div>
    </header>

    <div id="p5-wrap"></div>
    <div class="feed" id="feed-root"></div>

    <!-- Interface Drawer -->
    <div class="drawer" id="chat-drawer">
        <div class="drawer-header">
            <div class="drawer-title" id="drawer-char-name">Mathematician</div>
            <div class="close-btn" onclick="closeDrawer()">Disconnect</div>
        </div>
        <div class="chat-container">
            <div class="messages" id="chat-msgs"></div>
            <input type="text" id="chat-in" placeholder="Ask a question..." onkeydown="if(event.key==='Enter') sendChat()">
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyC6sJmEyQyyLKZs0BE21Xi4w8lYasVfNyw";

        const DB = [
            { id: 'al-khwarizmi', name: 'Al-Khwarizmi', period: '780 AD', accent: '#FFD700', tagline: 'The Father of Algebra.' },
            { id: 'archimedes', name: 'Archimedes', period: '287 BC', accent: '#FF7F50', tagline: 'Give me a lever, and I will move the Earth.' },
            { id: 'aryabhata', name: 'Aryabhata', period: '476 AD', accent: '#00E5FF', tagline: 'The Sage who mastered Zero and the Stars.' },
            { id: 'brahmagupta', name: 'Brahmagupta', period: '598 AD', accent: '#7000FF', tagline: 'Calculating the Infinite with pure reason.' },
            { id: 'euclid', name: 'Euclid', period: '300 BC', accent: '#00FF88', tagline: 'The Geometric Architect of Reality.' },
            { id: 'hypatia', name: 'Hypatia', period: '350 AD', accent: '#FF007A', tagline: 'The Last Light of Alexandria.' },
            { id: 'plato', name: 'Plato', period: '427 BC', accent: '#E100FF', tagline: 'Mathematics is the language of higher forms.' },
            { id: 'ptolemy', name: 'Ptolemy', period: '100 AD', accent: '#0088FF', tagline: 'Mapping the Cosmos and the Almagest.' },
            { id: 'pythagoras', name: 'Pythagoras', period: '570 BC', accent: '#FF4E00', tagline: 'All is Number. The Harmony of the Spheres.' },
            { id: 'thales', name: 'Thales', period: '624 BC', accent: '#00FFFF', tagline: 'The first to seek the natural cause.' }
        ];

        let activeChar = null;

        function buildFeed() {
            const root = document.getElementById('feed-root');
            DB.forEach((c, idx) => {
                const el = document.createElement('div');
                el.className = 'slide';
                el.innerHTML = `
                    <div class="period-header" style="--accent: ${c.accent}">${c.period}</div>
                    <div class="gta-title">${c.name}</div>
                    <div class="tagline">${c.tagline}</div>
                    <div class="menu">
                        <!-- Redirects to existing high-end /people subfolder -->
                        <div class="option" onclick="window.location.href='people/${c.id}/index.html'"><span class="option-label">Know About Me</span><span>→</span></div>
                        <div class="option" onclick="openChat('${c.id}')"><span class="option-label">Talk / Call</span><span>→</span></div>
                    </div>
                `;
                root.appendChild(el);
            });
        }

        function openChat(id) {
            activeChar = DB.find(c => c.id === id);
            document.getElementById('drawer-char-name').innerText = activeChar.name + " (Live Session)";
            document.getElementById('chat-drawer').classList.add('active');
            document.getElementById('chat-msgs').innerHTML = `<div class="msg ai">I am ${activeChar.name}. What shall we solve together?</div>`;
        }

        function closeDrawer() { document.getElementById('chat-drawer').classList.remove('active'); }

        async function sendChat() {
            const input = document.getElementById('chat-in');
            const box = document.getElementById('chat-msgs');
            const txt = input.value.trim();
            if(!txt) return;

            box.innerHTML += `<div class="msg user">${txt}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `You are ${activeChar.name}, the historical mathematician. Keep responses brief, historical, and mysterious. User input: ${txt}` }] }] })
                });
                const d = await res.json();
                box.innerHTML += `<div class="msg ai">${d.candidates[0].content.parts[0].text}</div>`;
            } catch(e) { box.innerHTML += `<div class="msg ai">The stars are too silent today.</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        new p5((p) => {
            let pts = [];
            p.setup = () => { p.createCanvas(p.windowWidth, p.windowHeight).parent('p5-wrap'); for(let i=0; i<40; i++) pts.push({x: p.random(p.width), y: p.random(p.height), vx: p.random(-0.3, 0.3), vy: p.random(-0.3, 0.3), r: p.random(1, 4)}); };
            p.draw = () => { 
                p.background(3, 3, 5);
                pts.forEach(pt => {
                    pt.x += pt.vx; pt.y += pt.vy;
                    if(pt.x<0) pt.x=p.width; if(pt.y<0) pt.y=p.height;
                    p.fill(255, 12); p.noStroke(); p.circle(pt.x, pt.y, pt.r);
                });
            };
        });

        buildFeed();
    </script>
</body>
</html>
